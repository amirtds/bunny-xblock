<div class="bunny-xblock bunny-xblock--student" data-has-video="{has_video}">
  <div class="bunny-xblock__player"{player_hidden_style}>
    <iframe class="bunny-xblock__iframe"
            src="{embed_url}"
            title="{title}"
            loading="lazy"
            allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
            allowfullscreen></iframe>
  </div>
  <div class="bunny-xblock__fallback"{fallback_hidden_style}>
    <p class="bunny-xblock__fallback-text">
      This video isn't available yet. The instructor may still be uploading or encoding it.
    </p>
  </div>
</div>
